spring.application.name=caballos

# MySQL datasource (use env vars DB_URL, DB_USER, DB_PASSWORD for overrides)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/caballos_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:caballos_user}
spring.datasource.password=${DB_PASSWORD:caballos_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
debug=false
logging.level.root=INFO
logging.level.com.granja.caballos=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Error details
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true
server.error.include-stacktrace=always
